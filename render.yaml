services:
  - type: web
    name: echoroom-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate && python manage.py loaddata db_seed.json"
    startCommand: "cd backend && gunicorn echoroom.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echoroom-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: "echoroom-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://echoroom-ui.onrender.com"

  - type: web
    name: echoroom-ui
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./build"
    routes:
      - type: rewrite
        source: "/api/*"
        destination: "https://echoroom-backend.onrender.com/api/*"
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: echoroom-db
    databaseName: echoroom
    user: admin
    plan: free
