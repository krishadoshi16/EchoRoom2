version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: echoroom
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/echoroom
      - SECRET_KEY=django-insecure-change-me-in-production
      - CORS_ALLOWED_ORIGINS=http://localhost,http://frontend
      - DEBUG=0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
